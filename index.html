<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C.O.T.E Web App | Unified Login</title>
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="/cote-v1/manifest.json" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
      <div class="loading-overlay-content">
        <img src="icons/cote-logo.png" alt="C.O.T.E System Logo" class="loading-logo" />
        <p class="loading-text">Initializing C.O.T.E System...</p>
      </div>
    </div>

    <main class="container auth-container" aria-labelledby="form-title">
      <div class="login-branding" aria-hidden="true">
        <img src="icons/cote-logo.png" alt="" class="login-brand-logo" />
      </div>
      <h1 id="form-title">C.O.T.E</h1>
      <p class="subtitle">Sign in with your registered email and password.</p>

      <form id="login-form" class="auth-form" novalidate>
        <div class="form-grid auth-grid">
          <div class="field field-full">
            <label for="email">Email <span aria-hidden="true">*</span></label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="field field-full">
            <label for="password">Password <span aria-hidden="true">*</span></label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>
        </div>

        <p id="form-message" class="form-message" role="status" aria-live="polite"></p>
        <button type="submit">Login</button>
      </form>

      <p class="auth-switch">
        No account yet?
        <a href="registration.html">Register here</a>
      </p>
    </main>

    <script type="module" src="login.js?v=2"></script>
  </body>
</html>
