<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COTE Web App | Registration</title>
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="/cote-v1/manifest.json" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container" aria-labelledby="form-title">
      <h1 id="form-title">Student Registration</h1>
      <p class="subtitle">Please complete all required details before submitting.</p>

      <form id="registration-form" novalidate>
        <div class="form-grid">
          <div class="field">
            <label for="first-name">First Name <span aria-hidden="true">*</span></label>
            <input id="first-name" name="firstName" type="text" autocomplete="given-name" required />
          </div>

          <div class="field">
            <label for="middle-name">Middle Name</label>
            <input id="middle-name" name="middleName" type="text" autocomplete="additional-name" />
          </div>

          <div class="field">
            <label for="last-name">Last Name <span aria-hidden="true">*</span></label>
            <input id="last-name" name="lastName" type="text" autocomplete="family-name" required />
          </div>

          <div class="field">
            <label for="sex">Sex <span aria-hidden="true">*</span></label>
            <select id="sex" name="sex" required>
              <option value="" selected disabled>Select sex</option>
              <option value="Female">Female</option>
              <option value="Male">Male</option>
              <option value="Other">Other</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </div>

          <div class="field">
            <label for="grade-level">Grade Level <span aria-hidden="true">*</span></label>
            <select id="grade-level" name="gradeLevel" required>
              <option value="" selected disabled>Select grade level</option>
              <option value="Grade 11">Grade 11</option>
              <option value="Grade 12">Grade 12</option>
            </select>
          </div>

       <div class="field">
  <label for="section">Section <span aria-hidden="true">*</span></label>
  <select id="section" name="section" required>
    <option value="" selected disabled>Select section</option>

    <option value="ABM 11 - Aboitiz">ABM 11 - Aboitiz</option>
    <option value="HUMSS 11 - Aristotle">HUMSS 11 - Aristotle</option>
    <option value="HUMSS 11 - Confucius">HUMSS 11 - Confucius</option>
    <option value="HUMSS 11 - Democritus">HUMSS 11 - Democritus</option>
    <option value="HUMSS 11 - Freud">HUMSS 11 - Freud</option>
    <option value="HUMSS 11 - Plato">HUMSS 11 - Plato</option>
    <option value="STEM 11 - Newton">STEM 11 - Newton</option>
    <option value="TVL HE 11 - Stewart">TVL HE 11 - Stewart</option>
    <option value="TVLE ICT 11 - Bill Gates">TVLE ICT 11 - Bill Gates</option>

    <option value="ABM 12 - Gokongwei">ABM 12 - Gokongwei</option>
    <option value="HUMSS 12 - Aquinas">HUMSS 12 - Aquinas</option>
    <option value="HUMSS 12 - Archimedes">HUMSS 12 - Archimedes</option>
    <option value="HUMSS 12 - Dewey">HUMSS 12 - Dewey</option>
    <option value="HUMSS 12 - Pythagoras">HUMSS 12 - Pythagoras</option>
    <option value="HUMSS 12 - Socrates">HUMSS 12 - Socrates</option>
    <option value="STEM 12 - Galileo">STEM 12 - Galileo</option>
    <option value="TVL HE 12 - Hilton">TVL HE 12 - Hilton</option>
    <option value="TVLE ICT 12 - Lovelace">TVLE ICT 12 - Lovelace</option>
  </select>
</div>

          <div class="field">
            <label for="birthday">Birthday <span aria-hidden="true">*</span></label>
            <input id="birthday" name="birthday" type="date" required />
          </div>

          <div class="field">
            <label for="lrn">LRN <span aria-hidden="true">*</span></label>
            <input id="lrn" name="lrn" type="text" inputmode="numeric" maxlength="12" required />
          </div>

          <div class="field">
            <label for="phone-number">Phone Number <span aria-hidden="true">*</span></label>
            <input
              id="phone-number"
              name="phoneNumber"
              type="tel"
              inputmode="tel"
              placeholder="e.g. 09171234567"
              required
            />
          </div>

          <div class="field field-full">
            <label for="address">Address <span aria-hidden="true">*</span></label>
            <input id="address" name="address" type="text" autocomplete="street-address" required />
          </div>

          <div class="field">
            <label for="email">Email <span aria-hidden="true">*</span></label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="field">
            <label for="password">Password <span aria-hidden="true">*</span></label>
            <input id="password" name="password" type="password" minlength="6" required />
          </div>
        </div>

        <p id="form-message" class="form-message" role="status" aria-live="polite"></p>
        <button type="submit">Submit</button>
      </form>

      <p class="auth-switch">
        Already have an account?
        <a href="index.html">Login here</a>
      </p>

      <p class="teacher-login-link" aria-label="Teacher registration link">
        <a href="teacher-register.html">Register as a teacher</a>
      </p>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
