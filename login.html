<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COTE Web App | Login</title>
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="/cote-v1/manifest.json" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container auth-container" aria-labelledby="form-title">
      <h1 id="form-title">Student Login</h1>
      <p class="subtitle">Sign in using your registered email address and password.</p>

      <form id="login-form" class="auth-form" novalidate>
        <div class="form-grid auth-grid">
          <div class="field field-full">
            <label for="email">Email <span aria-hidden="true">*</span></label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="field field-full">
            <label for="password">Password <span aria-hidden="true">*</span></label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>
        </div>

        <p id="form-message" class="form-message" role="status" aria-live="polite"></p>
        <button type="submit">Login</button>
      </form>

      <p class="auth-switch">
        No account yet?
        <a href="registration.html">Register here</a>
      </p>
    </main>

    <script type="module" src="login.js"></script>
  </body>
</html>
