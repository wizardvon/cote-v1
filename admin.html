<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COTE Web App | Admin Points</title>
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="/cote-v1/manifest.json" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container dashboard-container" aria-labelledby="admin-title">
      <section class="dashboard-header">
        <div>
          <h1 id="admin-title">Teacher Admin: Manage Student Points</h1>
          <p class="subtitle">Signed in as <strong id="admin-email">Loading...</strong></p>
        </div>
        <button id="logout-button" type="button" class="logout-button">Logout</button>
      </section>

      <section class="dashboard-card" aria-labelledby="bulk-points-title">
        <h2 id="bulk-points-title">Bulk Student Point Management</h2>

        <div class="admin-toolbar">
          <div class="field">
            <label for="section-filter">Filter by Section</label>
            <select id="section-filter">
              <option value="all">All Sections</option>
            </select>
          </div>
          <div class="field">
            <label for="student-search">Search by Name or LRN</label>
            <input id="student-search" type="text" placeholder="Type name or LRN" autocomplete="off" />
          </div>
          <div class="field admin-load-field">
            <label for="load-students-button">Load/Filter Students</label>
            <button id="load-students-button" type="button">Load Students</button>
          </div>
        </div>

        <div class="admin-table-wrap" role="region" aria-label="Student list" tabindex="0">
          <table class="admin-table">
            <thead>
              <tr>
                <th scope="col" class="checkbox-column">
                  <label class="checkbox-label" for="select-all">
                    <input id="select-all" type="checkbox" />
                    <span>Select All</span>
                  </label>
                </th>
                <th scope="col">Last Name</th>
                <th scope="col">First Name</th>
                <th scope="col">Middle Name</th>
                <th scope="col">LRN</th>
                <th scope="col">Section</th>
                <th scope="col">Current Points</th>
              </tr>
            </thead>
            <tbody id="students-table-body">
              <tr>
                <td colspan="8" class="empty-cell">Click "Load Students" to fetch and display students.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="admin-actions admin-bulk-actions">
          <div class="field admin-points-field">
            <label for="points-value">Points Value</label>
            <input
              id="points-value"
              type="number"
              min="1"
              step="1"
              inputmode="numeric"
              placeholder="Enter positive points"
            />
          </div>
          <button id="add-points-button" type="button">Add Merit Points</button>
          <button id="deduct-points-button" type="button" class="danger-button">Add Demerit Points</button>
        </div>

        <p id="admin-message" class="form-message" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="admin.js"></script>
  </body>
</html>
