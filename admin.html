<section id="page-class-record" class="page" data-page="class-record" aria-label="Class record">
  <article class="app-card">
    <h2>Class Record</h2>
    <p>View, edit, download, and print detailed class records by activity.</p>

    <div class="admin-toolbar score-toolbar">
      <div class="field">
        <label for="class-record-filter">Select Class</label>
        <select id="class-record-filter">
          <option value="">Select a class first</option>
        </select>
      </div>

      <div class="field admin-load-field">
        <label for="class-record-download-button">Download CSV</label>
        <button id="class-record-download-button" type="button">Download CSV</button>
      </div>

      <div class="field admin-load-field">
        <label for="class-record-print-button">Print</label>
        <button id="class-record-print-button" type="button">Print</button>
      </div>
    </div>

    <p id="class-record-message" class="form-message" role="status" aria-live="polite"></p>
  </article>

  <article class="app-card">
    <h3>Add Activity Column</h3>
    <p>Add columns under Written Works, Performance Task, or Exam.</p>

    <div class="admin-toolbar score-toolbar">
      <div class="field">
        <label for="activity-type">Component</label>
        <select id="activity-type">
          <option value="WW">Written Works</option>
          <option value="PT">Performance Task</option>
          <option value="Exam">Exam</option>
        </select>
      </div>

      <div class="field">
        <label for="activity-title">Activity Title</label>
        <input id="activity-title" type="text" placeholder="e.g. Quiz 1" />
      </div>

      <div class="field">
        <label for="activity-max-score">Highest Possible Score</label>
        <input id="activity-max-score" type="number" min="1" step="0.01" placeholder="e.g. 20" />
      </div>

      <div class="field admin-load-field">
        <label for="add-activity-button">Add</label>
        <button id="add-activity-button" type="button">Add Activity</button>
      </div>
    </div>
  </article>

  <article class="app-card">
    <h3>Detailed Class Record</h3>

    <div id="class-record-table" class="admin-table-wrap">
      <table class="student-table">
        <thead>
          <tr>
            <th>Name / Highest Possible Score</th>
            <th>No activity columns yet</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="2" class="empty-cell">Select a class and add activity columns.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </article>
</section>
